name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # Client — Lint, Build, Docker Build
  # ──────────────────────────────────────────────────────────
  client-ci:
    name: 🖥️ Client CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./QuickShow-FullStack/client

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: QuickShow-FullStack/client/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_CURRENCY: $
          VITE_BASE_URL: https://cine-mania-nine.vercel.app
          VITE_TMDB_IMAGE_BASE_URL: https://image.tmdb.org/t/p/original
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: QuickShow-FullStack/client/dist
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Server — Install, Syntax Check
  # ──────────────────────────────────────────────────────────
  server-ci:
    name: ⚙️ Server CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./QuickShow-FullStack/server

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: QuickShow-FullStack/server/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Syntax check
        run: node --check server.js

  # ──────────────────────────────────────────────────────────
  # Docker — Build images to verify Dockerfiles are valid
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [client-ci, server-ci]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Client Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./QuickShow-FullStack/client
          file: ./QuickShow-FullStack/client/Dockerfile
          push: false
          tags: cinemania-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_CURRENCY=$
            VITE_BASE_URL=https://cine-mania-nine.vercel.app
            VITE_TMDB_IMAGE_BASE_URL=https://image.tmdb.org/t/p/original

      - name: 🏗️ Build Server Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./QuickShow-FullStack/server
          file: ./QuickShow-FullStack/server/Dockerfile
          push: false
          tags: cinemania-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
